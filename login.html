<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Zyntra - Connexion</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d0d;color:#ececec;font-family:'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:48px 40px;width:100%;max-width:400px}
.logo{text-align:center;margin-bottom:32px}
.logo-icon{width:56px;height:56px;background:linear-gradient(135deg,#cc785c,#e8a87c);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:#fff;margin:0 auto 12px}
.logo h1{font-size:26px;font-weight:700;color:#fff}
.logo p{color:#888;font-size:13px;margin-top:4px}
.flash{background:#ff4444;color:#fff;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:18px;text-align:center}
label{display:block;font-size:12px;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
input{width:100%;background:#111;border:1px solid #333;border-radius:8px;color:#ececec;font-size:14px;padding:12px 14px;outline:none;transition:.2s;margin-bottom:18px}
input:focus{border-color:#cc785c}
.btn{width:100%;background:linear-gradient(135deg,#cc785c,#e8a87c);border:none;border-radius:8px;color:#fff;font-size:15px;font-weight:600;padding:13px;cursor:pointer}
.switch{text-align:center;margin-top:20px;font-size:13px;color:#888}
.switch a{color:#cc785c;text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">Z</div>
    <h1>Zyntra</h1>
    <p>Votre assistant IA intelligent</p>
  </div>
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="flash">{{ messages[0] }}</div>
    {% endif %}
  {% endwith %}
  <form method="POST">
    <label>Nom utilisateur</label>
    <input type="text" name="username" placeholder="Entrez votre nom" required>
    <label>Mot de passe</label>
    <input type="password" name="password" placeholder="Entrez votre mot de passe" required>
    <button class="btn" type="submit">Se connecter</button>
  </form>
  <div class="switch">Pas encore de compte ? <a href="/register">S'inscrire</a></div>
</div>
</body>
</html>
